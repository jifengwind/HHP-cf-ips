name: Collect CF Preferred IPs

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect-ips:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Collect IPs
        run: node speedtest.js
      - name: Commit results
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add ips.txt last-update.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update IPs" && git push)
